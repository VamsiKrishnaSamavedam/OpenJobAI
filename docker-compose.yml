services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: openjobai_postgres
    environment:
      POSTGRES_DB: openjobai
      POSTGRES_USER: openjobai_user
      POSTGRES_PASSWORD: openjobai_password
    ports:
      - "55432:5432"
    volumes:
      - openjobai_postgres_data_v2:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  openjobai_postgres_data_v2: